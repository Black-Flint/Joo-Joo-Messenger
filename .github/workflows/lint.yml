name: Lint

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  biome:
    name: Biome
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run check