networks:
  app-network:
    driver: bridge

# Persistent Volumes
volumes:
  postgres_data: # Persistent storage for PostgreSQL
    name: joo-joo-postgres-data

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:17-bookworm # Stable PostgreSQL image (Debian-based)
    container_name: joo-joo-postgres-dev

    restart: unless-stopped # Restart unless manually stopped
  
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist database data

    networks:
      - app-network # Internal app network

    logging:
      driver: json-file # Default Docker logging driver
      options:
        max-size: "10m" # Rotate logs after 10MB
        max-file: "5" # Keep max 5 log files

  api:
    build:
      context: .
      dockerfile: infra/docker/api.dockerfile
    container_name: joo-joo-api

    restart: unless-stopped # Restart unless manually stopped

    ports:
      - "4000:4000"

    networks:
      - app-network # Internal app network

    logging:
      driver: json-file # Default Docker logging driver
      options:
        max-size: "10m" # Rotate logs after 10MB
        max-file: "5" # Keep max 5 log files

  web:
    build:
      context: .
      dockerfile: infra/docker/web.dockerfile
    container_name: joo-joo-web

    restart: unless-stopped # Restart unless manually stopped

    ports:
      - "3000:3000"

    networks:
      - app-network # Internal app network

    logging:
      driver: json-file # Default Docker logging driver
      options:
        max-size: "10m" # Rotate logs after 10MB
        max-file: "5" # Keep max 5 log files
    